on:
  schedule:
    # 02:00 UTC daily = 07:30 IST. Adjust as needed.
    - cron: "0 2 * * *"  # ← Changed from "30 2 * * 0"
  workflow_dispatch:
    inputs:
      apply:
        description: "Actually write changes (otherwise dry-run)"
        type: boolean
        default: false
      only:
        description: "Limit to a single UPN (optional)"
        type: string
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      KEKA_BASE_URL:       ${{ secrets.KEKA_BASE_URL }}
      KEKA_CLIENT_ID:      ${{ secrets.KEKA_CLIENT_ID }}
      KEKA_CLIENT_SECRET:  ${{ secrets.KEKA_CLIENT_SECRET }}
      KEKA_API_KEY:        ${{ secrets.KEKA_API_KEY }}
      AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run sync
        run: |
          # For scheduled runs (cron): always use --apply
          # For manual dispatch: respect the user's input
          APPLY_FLAG=""
          if [ "${{ github.event_name }}" == "schedule" ] || [ "${{ inputs.apply }}" == "true" ]; then
            APPLY_FLAG="--apply"
          fi
          
          if [ -n "${{ inputs.only }}" ]; then
            python sync.py --verbose --only "${{ inputs.only }}" $APPLY_FLAG
          else
            python sync.py --verbose $APPLY_FLAG
          fi
